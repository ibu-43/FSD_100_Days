<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4</title>
</head>
<body>
    <!-- audio & video tag-->
    
    <p>Childrens day video:</p>
    <br>
    <video src="IES Childrens day.mp4" controls  muted loop width="400" height="200"></video>
    <br>
    <p>Audio:</p><br>
    <audio src="IES Childrens day.mp4" controls></audio>

    <br><br>
    <!-- div tag -->
    <div    style="border:2px solid black; padding:10px; width:300px;">
        <h3>Div tag example</h3>
        <p>This is a paragraph inside a div.</p>
    </div>
    <br><br>

    <!--span tag -->
    <span>This is a span tag example.</span>
    <br><br>

    <!-- Form Tag -->
    <form action="">
        <h4>Login Page:</h4><br>
        <label for="">Username:</label>
        <input type="text" maxlength="10">
        <br><br>
        <label for="">Password:</label>
        <input type="password" required minlength="8">
        <br><br>
        <label for="">Email:</label>
        <input type="email" required>
        <br><br>
        <label for="">Number: </label>
        <input type="number">
        <br><br>
        <label for="">D.O.B:</label>
        <input type="date">
        <br><br>
        <label for="">Favourite:</label>
        <input type="checkbox">HTML
        <input type="checkbox">CSS
        <input type="checkbox">JavaScript
        <br><br>
        <label for="">Select one:</label>
        <input type="radio">Male
        <input type="radio">Female
        <br><br>
        <label for="">Work:</label>
        <select>
            <option value="">Student</option>
            <option value="">Teacher</option>
            <option value="">Parent</option>
        </select>
        <br><br>
        <label for="">Comments:</label><br>
        <textarea name="" id=""></textarea>
        <br><br>
        <input type="submit" value="Submit">
        <button type="reset">Reset</button>

    </form>
</body>
</html>
